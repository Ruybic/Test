name: Daily Community Sync

on:
  schedule:
    - cron: '0 4 * * *'  # Runs at 04:00 UTC (07:00 Baghdad Time)
  workflow_dispatch:      # Allows manual trigger for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Crucial for the Action to push data back

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install  # Ensure 'axios' or other libs used in scraper are here

      - name: Run Scraper (fetch_daily.js)
        run: node fetch_daily.js
        env:
          OSU_API_KEY: ${{ secrets.OSU_API_KEY }}

      - name: Run Insights Generator (GI.js)
        run: node GI.js

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/
          git commit -m "Auto-sync: Scraped scores and updated community insights [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push
