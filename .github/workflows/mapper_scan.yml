name: Iraqi Mapper Scan

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allows you to run it manually from the "Actions" tab whenever you want

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install node-fetch

      - name: Run Mapper Scanner
        env:
          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
          # Increase timeout to 2 hours just in case the API is slow
        run: node mapping.js
        timeout-minutes: 120

      - name: Commit and Push Data
        run: |
          git config --global user.name "OIT Bot"
          git config --global user.email "bot@osuiraq.today"
          git add data/mapping/iraqi_mappers.json
          
          # Only commit if there are actually changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Update Iraqi Mapper Database [skip ci]" && git push)
          
