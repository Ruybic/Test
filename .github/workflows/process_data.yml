name: Generate Community Insights

on:
  schedule:
    # Runs at 05:00 UTC (08:00 Baghdad) daily
    - cron: '0 5 * * *' 
  workflow_dispatch:
    inputs:
      mode:
        description: 'Update Mode (Daily vs Full History)'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - backfill

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run Insights Script
        run: |
          if [ "${{ github.event.inputs.mode }}" == "backfill" ]; then
            echo "🚀 Mode: FULL BACKFILL - Recalculating all history..."
            node GI_backfill.js --all
          else
            echo "📊 Mode: DAILY - Processing yesterday's data..."
            node GI_backfill.js
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/community_insights.json
          
          if git diff --staged --quiet; then
            echo "No changes to community_insights.json found. Skipping commit."
          else
            git commit -m "Community Pulse Sync [$(date +'%Y-%m-%d')]"
            git push
          fi
