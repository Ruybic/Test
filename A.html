<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFK Miner | osu! Iraq</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://i.imgur.com/Zgd9kDC.jpg">
    <style>
        :root {
            /* Dynamic theme color, changes every 5 mins */
            --osu-pink: #ff66aa; 
            --osu-pink-dark: #cc4488;
            --dark-base: #1a1a20;
            --dark-deeper: #13131a;
            --panel-bg: #272730;
            --panel-border: rgba(255,255,255,0.07);
            --text-main: #ffffff;
            --text-muted: #8888a0;
            --accent-gold: #ffd700;
            --accent-green: #66ffbb;
            --accent-red: #ff4466;
            transition: --osu-pink 1s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        /* ─── CANVAS BACKGROUND ─── */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            transition: filter 1s ease;
        }

        body {
            background-color: var(--dark-base);
            color: var(--text-main);
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 0;
            scroll-behavior: smooth;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header, .game-container, footer {
            position: relative; z-index: 1;
        }

        /* ─── HEADER (Preserved Styling) ─── */
        header {
            background: rgba(15,15,20,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,102,170,0.15); /* Keep original border tint or make dynamic */
            position: sticky; top: 0; z-index: 1000;
            height: 60px;
        }
        .logo-box a { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-box img { height: 34px; border-radius: 8px; display: block; }
        .logo-text { color: #fff; font-weight: 800; font-size: 18px; white-space: nowrap; }
        .logo-text span { color: var(--osu-pink); transition: color 1s ease;}
        .logo-box a:hover .logo-text { color: var(--osu-pink); transition: color 0.2s; }

        .dropdown { position: relative; display: flex; align-items: center; }
        .dropbtn {
            background: rgba(255,255,255,0.06);
            color: white; border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 18px; border-radius: 8px; cursor: pointer;
            font-family: 'Exo 2'; font-weight: 700; font-size: 14px;
            transition: all 0.2s ease;
        }
        .dropbtn:hover { background: rgba(255,255,255,0.1); }
        .dropdown-content {
            visibility: hidden; opacity: 0; transform: translateY(8px) scale(0.97);
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.2,0.8,0.2,1), visibility 0.2s;
            position: absolute; right: 0; top: calc(100% + 12px); min-width: 270px; z-index: 2000;
            background: rgba(20,20,28,0.97); backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.1);
            border-radius: 14px; padding: 8px;
        }
        .dropdown-content.show { visibility: visible; opacity: 1; transform: translateY(0) scale(1); }
        .menu-item {
            position: relative; color: var(--text-muted); padding: 11px 14px; text-decoration: none;
            display: block; font-size: 14px; border-radius: 8px; transition: all 0.2s ease; margin-bottom: 2px;
            overflow: hidden;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }
        
        /* ─── GAME CONTAINER ─── */
        .game-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        /* ─── WALLET PANEL ─── */
        .wallet-panel {
            background: rgba(39, 39, 48, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-top: 3px solid var(--osu-pink);
            border-radius: 16px;
            padding: 30px 60px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 1s ease, box-shadow 1s ease;
            position: relative;
        }
        .wallet-panel h2 {
            margin: 0 0 10px 0;
            color: var(--text-muted);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .coin-count {
            font-size: 64px;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .coin-count svg {
            width: 50px; height: 50px;
            fill: var(--accent-gold);
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }

        /* ─── STAGE & ANIMATIONS ─── */
        .stage-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Center Countdown */
        .countdown-timer {
            position: absolute;
            z-index: 10;
            font-size: 32px;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .phase-name {
            position: absolute;
            bottom: -40px;
            color: var(--osu-pink);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 1s ease;
        }

        /* Dynamic Visualizer Stage */
        .visualizer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Anim 1: The Core (Pink) */
        .anim-core {
            width: 150px; height: 150px;
            background: radial-gradient(circle, var(--osu-pink) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseCore 2s infinite alternate ease-in-out;
            box-shadow: 0 0 50px var(--osu-pink);
        }
        @keyframes pulseCore {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        /* Anim 2: The Portal (Cyan) */
        .anim-portal {
            width: 180px; height: 180px;
            border: 4px dashed var(--osu-pink);
            border-radius: 50%;
            animation: spinPortal 10s linear infinite;
        }
        .anim-portal::before {
            content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 4px solid rgba(255,255,255,0.2);
            border-radius: 50%; border-top-color: var(--osu-pink);
            animation: spinPortal 3s linear infinite reverse;
        }
        @keyframes spinPortal { 100% { transform: rotate(360deg); } }

        /* Anim 3: The Matrix (Green) */
        .anim-matrix {
            display: flex; gap: 8px; align-items: flex-end; height: 120px;
        }
        .anim-matrix div {
            width: 16px; background: var(--osu-pink); border-radius: 4px 4px 0 0;
            animation: matrixBounce 0.5s ease-in-out infinite alternate;
            box-shadow: 0 0 15px var(--osu-pink);
        }
        .anim-matrix div:nth-child(2) { animation-delay: 0.1s; }
        .anim-matrix div:nth-child(3) { animation-delay: 0.2s; }
        .anim-matrix div:nth-child(4) { animation-delay: 0.3s; }
        .anim-matrix div:nth-child(5) { animation-delay: 0.4s; }
        @keyframes matrixBounce { 0% { height: 20px; } 100% { height: 120px; } }

        /* Anim 4: The Tesseract (Purple) */
        .anim-tesseract {
            width: 100px; height: 100px;
            background: transparent;
            border: 4px solid var(--osu-pink);
            animation: tumble 4s linear infinite;
            box-shadow: inset 0 0 20px var(--osu-pink), 0 0 20px var(--osu-pink);
        }
        @keyframes tumble {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        /* Float text for +1 coin */
        .float-reward {
            position: absolute;
            color: var(--accent-gold);
            font-weight: 900;
            font-size: 24px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            animation: floatUp 2s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        /* ─── FOOTER ─── */
        footer {
            background: var(--dark-deeper); color: #fff;
            padding: 20px 16px 32px; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto;
        }
        footer h3 { color: var(--osu-pink); margin: 0 0 6px; font-size: 18px; transition: color 1s ease; }
        footer p  { margin: 0; font-size: 13px; color: #666; }
        footer a  { color: var(--text-muted); text-decoration: none; font-weight: 700; transition: color 0.2s;}
        footer a:hover { color: var(--osu-pink); }
        footer hr { border: 0; border-top: 1px solid #2a2a35; margin: 14px 0; }
        .footer-links { margin: 10px 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
    <div class="logo-box">
        <a href="#">
            <img src="https://i.imgur.com/Zgd9kDC.jpg" alt="osu! Iraq Today">
            <span class="logo-text">osu! Iraq <span>Today</span></span>
        </a>
    </div>
    <div class="dropdown">
        <button class="dropbtn" id="menuBtn">Menu ▾</button>
        <div class="dropdown-content" id="myDropdown">
            <a href="#" class="menu-item">Miner Dashboard<span class="menu-desc">You are here</span></a>
            <a href="#" class="menu-item">Leaderboard<span class="menu-desc">Who has the most AFK coins?</span></a>
            <a href="#" class="menu-item">Shop (Soon)<span class="menu-desc">Spend your digital coins</span></a>
        </div>
    </div>
</header>

<div class="game-container">
    
    <div class="wallet-panel">
        <h2>Digital Wallet</h2>
        <div class="coin-count">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.25 1.64-1.74 0-2.1-.96-2.17-1.92H8c.07 1.81 1.29 2.94 2.9 3.32V19h2.33v-1.66c1.67-.34 2.89-1.38 2.89-3.04 0-1.94-1.59-2.71-3.81-3.16z"/>
            </svg>
            <span id="coinDisplay">0</span>
        </div>
        <div style="color: var(--text-muted); font-size: 13px; margin-top: 10px;">Idle safely. Coins auto-save to browser.</div>
    </div>

    <div class="stage-wrapper" id="stageWrap">
        <div class="visualizer" id="visualizerBox"></div>
        
        <div class="countdown-timer" id="timerDisplay">05:00</div>
        <div class="phase-name" id="phaseName">Phase: Awakening</div>
    </div>

</div>

<footer>
    <div style="max-width:900px; margin:0 auto;">
        <h3>osu! Iraq Today</h3>
        <p>Built with ❤️ for the Iraqi osu! Community</p>
        <hr>
        <div class="footer-links">
            <a href="#">GitHub</a>
            <a href="#">Discord</a>
            <a href="#">Documentation</a>
        </div>
    </div>
</footer>

<script>
// ─── MENU DROPDOWN ───
const menuBtn  = document.getElementById('menuBtn');
const dropdown = document.getElementById('myDropdown');
menuBtn.onclick = (e) => { dropdown.classList.toggle('show'); e.stopPropagation(); };
window.onclick  = (e) => { if (!e.target.matches('.dropbtn')) dropdown.classList.remove('show'); };

// ─── GAME LOGIC & PHASES ───
const CYCLE_TIME = 300; // 5 minutes in seconds

// Game State
let coins = parseInt(localStorage.getItem('afk_coins')) || 0;
let timeLeft = CYCLE_TIME; 
let currentPhaseIndex = 0;

// DOM Elements
const coinDisplay = document.getElementById('coinDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const visualizerBox = document.getElementById('visualizerBox');
const phaseName = document.getElementById('phaseName');
const rootElement = document.documentElement;
const stageWrap = document.getElementById('stageWrap');

// Phase Definitions (Changes every 5 mins)
const phases = [
    { name: "Phase 1: Pink Core", color: "#ff66aa", animHTML: '<div class="anim-core"></div>', shape: 'triangle' },
    { name: "Phase 2: Cyan Portal", color: "#00e5ff", animHTML: '<div class="anim-portal"></div>', shape: 'circle' },
    { name: "Phase 3: Golden Matrix", color: "#ffd700", animHTML: '<div class="anim-matrix"><div></div><div></div><div></div><div></div><div></div></div>', shape: 'diamond' },
    { name: "Phase 4: Void Tesseract", color: "#b366ff", animHTML: '<div class="anim-tesseract"></div>', shape: 'square' }
];

// Initialize Game
function initGame() {
    updateCoinUI();
    setPhase(0);
    setInterval(gameTick, 1000);
}

function updateCoinUI() {
    coinDisplay.innerText = coins;
}

function setPhase(index) {
    currentPhaseIndex = index % phases.length;
    const phase = phases[currentPhaseIndex];
    
    // Update CSS Variable (Changes borders, logos, shadows universally)
    rootElement.style.setProperty('--osu-pink', phase.color);
    
    // Update Stage HTML
    visualizerBox.innerHTML = phase.animHTML;
    phaseName.innerText = phase.name;
    
    // Tell Canvas to update shapes
    currentBgShape = phase.shape;
}

function spawnRewardText() {
    const floatText = document.createElement('div');
    floatText.className = 'float-reward';
    floatText.innerText = '+1 Coin';
    // Center it on the wallet
    floatText.style.top = '20px';
    floatText.style.left = '50%';
    floatText.style.transform = 'translateX(-50%)';
    document.querySelector('.wallet-panel').appendChild(floatText);
    
    setTimeout(() => { floatText.remove(); }, 2000);
}

function gameTick() {
    timeLeft--;
    
    if (timeLeft <= 0) {
        // Reward Player
        coins++;
        localStorage.setItem('afk_coins', coins);
        updateCoinUI();
        spawnRewardText();
        
        // Reset Timer & Next Phase
        timeLeft = CYCLE_TIME;
        setPhase(currentPhaseIndex + 1);
    }
    
    // Format MM:SS
    const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
    const s = (timeLeft % 60).toString().padStart(2, '0');
    timerDisplay.innerText = `${m}:${s}`;
}

// ─── DYNAMIC BACKGROUND CANVAS ───
let currentBgShape = 'triangle';

(function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    function mkParticle() {
        const size     = 10 + Math.random() * 30;
        const x        = Math.random() * W;
        const startY   = H + size + Math.random() * 200;
        const speed    = 0.2 + Math.random() * 0.4;
        const rotSpeed = (Math.random() - 0.5) * 0.01;
        const angle    = Math.random() * Math.PI * 2;
        // Grab current theme color via JS to tint particles slightly
        const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--osu-pink').trim();
        const alpha    = 0.03 + Math.random() * 0.07;
        
        return { x, y: startY, size, speed, rotSpeed, angle, alpha, color: themeColor || '#ffffff' };
    }

    const particles = [];
    for (let i = 0; i < 25; i++) {
        const p = mkParticle(); p.y = Math.random() * (H + 400) - 200;
        particles.push(p);
    }

    function drawParticle(p, op) {
        ctx.save();
        ctx.translate(p.x, p.y); 
        ctx.rotate(p.angle);
        ctx.beginPath();
        
        ctx.globalAlpha = op;
        ctx.strokeStyle = p.color;
        ctx.fillStyle = p.color;
        ctx.lineWidth = 1.5;

        const s = p.size;
        
        if (currentBgShape === 'triangle') {
            ctx.moveTo(0, -s * 0.6);
            ctx.lineTo(s * 0.5, s * 0.4);
            ctx.lineTo(-s * 0.5, s * 0.4);
        } else if (currentBgShape === 'circle') {
            ctx.arc(0, 0, s/2, 0, Math.PI * 2);
        } else if (currentBgShape === 'square') {
            ctx.rect(-s/2, -s/2, s, s);
        } else if (currentBgShape === 'diamond') {
            ctx.moveTo(0, -s/2);
            ctx.lineTo(s/2, 0);
            ctx.lineTo(0, s/2);
            ctx.lineTo(-s/2, 0);
        }
        
        ctx.closePath();
        ctx.stroke();
        ctx.globalAlpha = op * 0.15;
        ctx.fill();
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, W, H);
        const fadeZone = H * 0.15;
        
        // Always try to keep particle colors matched to the current theme
        const liveThemeColor = getComputedStyle(document.documentElement).getPropertyValue('--osu-pink').trim();

        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.y -= p.speed; p.angle += p.rotSpeed;
            // slowly transition colors to current theme
            p.color = liveThemeColor; 
            
            let op = p.alpha;
            const fromBottom = (H + 60) - p.y;
            if (fromBottom < 120) op *= fromBottom / 120;
            if (p.y < fadeZone)   op *= p.y / fadeZone;
            if (op > 0.001) drawParticle(p, op);
            if (p.y < -p.size * 2) particles[i] = mkParticle();
        }
        requestAnimationFrame(animate);
    }
    animate();
})();

// ─── START ───
initGame();
</script>
</body>
</html>
