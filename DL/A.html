<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFK Miner | Sleek Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://i.imgur.com/Zgd9kDC.jpg">
    <style>
        :root {
            --osu-pink: #ff66aa; 
            --dark-base: #1a1a20;
            --dark-deeper: #13131a;
            --panel-bg: rgba(39, 39, 48, 0.5);
            --panel-border: rgba(255,255,255,0.06);
            --text-main: #ffffff;
            --text-muted: #8888a0;
            --accent-gold: #ffd700;
            transition: --osu-pink 0.8s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        body {
            background-color: var(--dark-base);
            color: var(--text-main);
            font-family: 'Exo 2', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header, .game-container, footer, .floating-wallet {
            position: relative; z-index: 1;
        }

        /* ─── HEADER ─── */
        header {
            background: rgba(15,15,20,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 1000;
            height: 60px;
        }
        .logo-box a { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-box img { height: 34px; border-radius: 8px; display: block; }
        .logo-text { color: #fff; font-weight: 800; font-size: 18px; }
        .logo-text span { color: var(--osu-pink); transition: color 0.8s; }

        /* ─── MINI FLOATING WALLET (TOP LEFT) ─── */
        .floating-wallet {
            position: fixed;
            top: 75px;
            left: 24px;
            background: rgba(20, 20, 28, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 999;
            transition: border-color 0.5s;
        }
        .floating-wallet:hover {
            border-color: var(--osu-pink);
        }
        .wallet-icon {
            width: 18px; height: 18px;
            fill: var(--accent-gold);
            filter: drop-shadow(0 0 4px rgba(255,215,0,0.4));
        }
        .wallet-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .wallet-value {
            font-size: 15px;
            font-weight: 900;
            color: #fff;
        }

        /* ─── DROPDOWN MENU ─── */
        .dropdown { position: relative; display: flex; align-items: center; }
        .dropbtn {
            background: rgba(255,255,255,0.05);
            color: white; border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-family: 'Exo 2'; font-weight: 700; font-size: 13px;
        }
        .dropdown-content {
            visibility: hidden; opacity: 0; transform: translateY(8px) scale(0.97);
            transition: all 0.2s ease;
            position: absolute; right: 0; top: calc(100% + 12px); min-width: 200px;
            background: rgba(20,20,28,0.95); backdrop-filter: blur(20px);
            border-radius: 10px; padding: 6px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .dropdown-content.show { visibility: visible; opacity: 1; transform: translateY(0) scale(1); }
        .menu-item {
            color: var(--text-muted); padding: 8px 12px; text-decoration: none;
            display: block; font-size: 13px; border-radius: 6px;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* ─── MAIN HUB ─── */
        .game-container {
            max-width: 600px;
            margin: auto;
            padding: 40px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ─── MINIMALIST RING TIMER ─── */
        .timer-stage {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .svg-ring {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .ring-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.03);
            stroke-width: 6;
        }

        .ring-progress {
            fill: none;
            stroke: var(--osu-pink);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.8s ease;
            filter: drop-shadow(0 0 8px var(--osu-pink));
        }

        .timer-text-container {
            position: absolute;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .countdown-numbers {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            line-height: 1;
        }

        .phase-subtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
            transition: color 0.8s;
        }

        /* Pure clean text notification pop */
        .wallet-pop {
            position: absolute;
            right: -20px;
            top: -10px;
            font-size: 12px;
            font-weight: 800;
            color: var(--accent-gold);
            animation: cleanPop 1.2s ease-out forwards;
        }
        @keyframes cleanPop {
            0% { opacity: 0; transform: translateY(5px); }
            20% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); }
        }

        /* ─── FOOTER ─── */
        footer {
            background: var(--dark-deeper);
            padding: 24px 16px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.02);
        }
        footer p { margin: 0; font-size: 12px; color: #444; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- Top-Left Compact Wallet Dashboard Widget -->
<div class="floating-wallet">
    <svg class="wallet-icon" viewBox="0 0 24 24">
        <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
    </svg>
    <span class="wallet-label">Wallet</span>
    <span class="wallet-value" id="coinDisplay">0</span>
    <div id="popContainer"></div>
</div>

<header>
    <div class="logo-box">
        <a href="#">
            <img src="https://i.imgur.com/Zgd9kDC.jpg" alt="Logo">
            <span class="logo-text">osu! Iraq <span>Today</span></span>
        </a>
    </div>
    <div class="dropdown">
        <button class="dropbtn" id="menuBtn">Menu ▾</button>
        <div class="dropdown-content" id="myDropdown">
            <a href="#" class="menu-item">Dashboard</a>
            <a href="#" class="menu-item">Leaderboard</a>
        </div>
    </div>
</header>

<div class="game-container">
    
    <!-- Minimal Premium Ring Display -->
    <div class="timer-stage">
        <svg class="svg-ring" viewBox="0 0 100 100">
            <circle class="ring-track" cx="50" cy="50" r="45" />
            <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="45" stroke-dasharray="282.7" stroke-dashoffset="0" />
        </svg>
        
        <div class="timer-text-container">
            <span class="countdown-numbers" id="timerDisplay">00:10</span>
            <span class="phase-subtitle" id="phaseName">Syncing</span>
        </div>
    </div>

</div>

<footer>
    <p>© 2026 osu! Iraq Today • Clean Idle Module</p>
</footer>

<script>
// Menu handling
const menuBtn  = document.getElementById('menuBtn');
const dropdown = document.getElementById('myDropdown');
menuBtn.onclick = (e) => { dropdown.classList.toggle('show'); e.stopPropagation(); };
window.onclick  = (e) => { if (!e.target.matches('.dropbtn')) dropdown.classList.remove('show'); };

// ─── CONFIGURATION (10s Debug Mode) ───
const CYCLE_TIME = 10; 
const CIRCUMFERENCE = 282.7;

let coins = parseInt(localStorage.getItem('afk_coins_clean')) || 0;
let timeLeft = CYCLE_TIME;
let phaseIndex = 0;

const phases = [
    { name: "Alpha", color: "#ff66aa" },
    { name: "Epsilon", color: "#00e5ff" },
    { name: "Zeta", color: "#ffd700" },
    { name: "Omega", color: "#b366ff" }
];

const coinDisplay = document.getElementById('coinDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const phaseName = document.getElementById('phaseName');
const ringProgress = document.getElementById('ringProgress');
const popContainer = document.getElementById('popContainer');

function init() {
    coinDisplay.innerText = coins;
    applyPhase();
    setInterval(tick, 1000);
}

function applyPhase() {
    const current = phases[phaseIndex % phases.length];
    document.documentElement.style.setProperty('--osu-pink', current.color);
    phaseName.innerText = current.name;
}

function triggerMiniPop() {
    const pop = document.createElement('span');
    pop.className = 'wallet-pop';
    pop.innerText = '+1';
    popContainer.appendChild(pop);
    setTimeout(() => pop.remove(), 1200);
}

function tick() {
    timeLeft--;
    
    if (timeLeft < 0) {
        coins++;
        localStorage.setItem('afk_coins_clean', coins);
        coinDisplay.innerText = coins;
        triggerMiniPop();
        
        timeLeft = CYCLE_TIME;
        phaseIndex++;
        applyPhase();
    }
    
    // Update numeric readout
    const secs = timeLeft.toString().padStart(2, '0');
    timerDisplay.innerText = `00:${secs}`;
    
    // Update SVG Stroke offset smoothly
    const offset = CIRCUMFERENCE - (timeLeft / CYCLE_TIME) * CIRCUMFERENCE;
    ringProgress.style.strokeDashoffset = offset;
}

// ─── AMBIENT BACKGROUND STAR DUST ───
(function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    function createParticle() {
        return {
            x: Math.random() * W,
            y: H + Math.random() * 20,
            size: 1 + Math.random() * 2,
            speed: 0.15 + Math.random() * 0.3,
            alpha: 0.05 + Math.random() * 0.15
        };
    }

    const particles = Array.from({ length: 40 }, () => {
        let p = createParticle();
        p.y = Math.random() * H; // randomize initial distribution
        return p;
    });

    function draw() {
        ctx.clearRect(0, 0, W, H);
        const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--osu-pink').trim();
        
        ctx.fillStyle = themeColor;
        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            p.y -= p.speed;
            
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            
            if (p.y < -10) {
                particles[i] = createParticle();
            }
        }
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(draw);
    }
    draw();
})();

init();
</script>
</body>
</html>
