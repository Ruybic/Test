<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osu! Iraq Today | Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="OIT.png">
    <style>
        :root { 
            --osu-pink: #ff66aa; 
            --dark-base: #1c1c21; 
            --panel-bg: #2e2e38; 
            --text-main: #ffffff; 
            --text-muted: #888895; 
        }
        body { 
            background-color: var(--dark-base); 
            color: var(--text-main); 
            font-family: 'Exo 2', sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background: #111116; 
            padding: 12px 25px; 
            display: flex; 
            align-items: center;
            justify-content: space-between; 
            border-bottom: 2px solid var(--panel-bg);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .logo-box { margin-left: -10px; }
        .logo-box a { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        
        /* New Archive Header Icon */
        .archive-icon {
            width: 28px;
            height: 28px;
            fill: var(--osu-pink);
        }
        .logo-text { color: var(--osu-pink); font-weight: 800; font-size: 18px; letter-spacing: 0.5px; }
        .logo-box a:hover { filter: brightness(1.1); }

        /* --- DROPDOWN SYSTEM (Kept from original) --- */
        .dropdown { position: relative; display: flex; align-items: center; }
        .dropbtn { 
            background: var(--panel-bg); color: white; border: 1px solid rgba(255,255,255,0.05); 
            padding: 10px 18px; border-radius: 6px; cursor: pointer; 
            font-family: 'Exo 2', sans-serif; font-weight: 600; font-size: 14px; transition: all 0.2s ease; 
        }
        .dropbtn:hover { background: #3e3e4a; border-color: var(--osu-pink); }
        .dropdown-content {
            visibility: hidden; opacity: 0; transform: translateY(10px); 
            transition: all 0.2s ease; position: absolute; right: 0; top: calc(100% + 10px); 
            min-width: 260px; z-index: 2000; background-color: rgba(28, 28, 33, 0.9); 
            backdrop-filter: blur(15px); box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 8px; 
        }
        .dropdown-content.show { visibility: visible; opacity: 1; transform: translateY(0); }
        .dropdown-content a { 
            position: relative; color: var(--text-muted); padding: 12px 16px; 
            text-decoration: none; display: block; font-size: 14px; border-radius: 8px; transition: 0.25s; 
        }
        .dropdown-content a .menu-desc { display: block; font-size: 11px; color: #6a6a7a; margin-top: 4px; }
        .dropdown-content a:hover { background: rgba(255, 102, 170, 0.1); color: white; }
        .dropdown-content a:hover .menu-desc { color: var(--osu-pink); }

        /* --- ARCHIVE LAYOUT --- */
        .archive-container {
            display: flex;
            flex: 1;
            overflow: hidden; /* Prevent page scroll, scroll inner elements */
            height: calc(100vh - 65px); /* Minus header height */
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: #15151a;
            border-right: 1px solid var(--panel-bg);
            padding: 20px 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            padding: 12px 20px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(255, 102, 170, 0.05);
            color: white;
            border-left: 3px solid var(--osu-pink);
        }
        
        .menu-icon { margin-right: 10px; font-size: 16px; }
        .chevron { transition: transform 0.3s ease; font-size: 12px; }
        .menu-item.open .chevron { transform: rotate(90deg); }

        /* Submenu Animation */
        .sub-menu {
            max-height: 0;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .sub-menu.open { max-height: 300px; /* Arbitrary large height to allow expansion */ }
        
        .sub-item {
            padding: 10px 20px 10px 45px;
            color: #777;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .sub-item::before {
            content: "└";
            margin-right: 8px;
            color: #444;
        }
        .sub-item:hover, .sub-item.active { color: var(--osu-pink); }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            padding: 20px 30px;
            overflow-y: auto;
            background: var(--dark-base);
        }

        /* Toolbar (Breadcrumbs & Search) */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--panel-bg);
        }

        .breadcrumbs {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .breadcrumbs span { cursor: pointer; transition: 0.2s; }
        .breadcrumbs span:hover { color: white; }
        .breadcrumbs .current { color: var(--osu-pink); pointer-events: none; }

        .search-bar {
            position: relative;
            width: 300px;
        }
        .search-bar input {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid #3e3e4a;
            color: white;
            padding: 10px 15px 10px 35px;
            border-radius: 8px;
            font-family: 'Exo 2', sans-serif;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }
        .search-bar input:focus { border-color: var(--osu-pink); box-shadow: 0 0 10px rgba(255,102,170,0.2); }
        .search-bar svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--text-muted);
            width: 16px;
        }

        /* --- GRID AND CARDS --- */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--panel-bg);
            border: 1px solid #3e3e4a;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            animation: cardFadeIn 0.3s ease backwards;
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--osu-pink); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

        /* Folder Specific */
        .folder-icon {
            font-size: 48px;
            text-align: center;
            padding: 30px 0;
            background: rgba(0,0,0,0.2);
            color: var(--osu-pink);
        }

        /* File Specific */
        .file-preview {
            height: 150px;
            background: #111;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .file-preview::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
        }

        .card-info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { font-weight: 800; font-size: 15px; margin-bottom: 5px; color: white; }
        .card-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; flex-grow: 1; }
        
        .card-meta {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-top: auto;
        }
        .date-badge { font-size: 10px; color: #888; background: #222; padding: 3px 8px; border-radius: 4px; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .tag { 
            background: rgba(255, 102, 170, 0.15); color: var(--osu-pink); 
            font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; 
        }

        .no-results { grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 40px; }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <a href="index.html">
            <svg class="archive-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20,6h-8l-2-2H4C2.9,4,2,4.9,2,6v12c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V8C22,6.9,21.1,6,20,6z M20,18H4V8h16V18z"/>
            </svg>
            <span class="logo-text">Archive | Data Vault</span>
        </a>
    </div>
    <div class="dropdown">
        <button class="dropbtn" id="menuBtn">Menu ▼</button>
        <div class="dropdown-content" id="myDropdown">
            <a href="Test.html">Scores <span class="menu-desc">See what happened today?</span></a>
            <a href="archive.html" class="active" style="background: rgba(255, 102, 170, 0.15); color: white; font-weight: bold;">
                Archive <span class="menu-desc">Explore community files</span>
            </a>
            <a href="socials.html">Socials <span class="menu-desc">Connect with the community</span></a>
        </div>
    </div>
</header>

<div class="archive-container">
    <aside class="sidebar">
        <div class="menu-item" onclick="loadCategory('all')">
            <span><span class="menu-icon">🗂️</span> All Files</span>
        </div>
        
        <div class="menu-item" onclick="toggleMenu('imagesMenu')">
            <span><span class="menu-icon">🖼️</span> Images</span>
            <span class="chevron">▶</span>
        </div>
        <div class="sub-menu" id="imagesMenu">
            <div class="sub-item" onclick="loadSubCategory('images', 'profile')">Player Profiles</div>
            <div class="sub-item" onclick="loadSubCategory('images', 'ingame')">In-Game Screenshots</div>
            <div class="sub-item" onclick="loadSubCategory('images', 'memes')">Community Memes</div>
        </div>

        <div class="menu-item" onclick="loadCategory('videos')">
            <span><span class="menu-icon">🎥</span> Videos</span>
        </div>
        
        <div class="menu-item" onclick="loadCategory('voice')">
            <span><span class="menu-icon">🎙️</span> Voice Notes</span>
        </div>

        <div class="menu-item" onclick="loadCategory('text')">
            <span><span class="menu-icon">📝</span> Text & Docs</span>
        </div>
    </aside>

    <main class="main-content">
        <div class="toolbar">
            <div class="breadcrumbs" id="breadcrumbTrail">
                </div>
            <div class="search-bar">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Search by name or #tag..." onkeyup="handleSearch()">
            </div>
        </div>

        <div class="file-grid" id="fileGrid">
            </div>
    </main>
</div>

<script>
    // --- DROPDOWN LOGIC ---
    const menuBtn = document.getElementById('menuBtn');
    const dropdown = document.getElementById('myDropdown');
    menuBtn.onclick = (e) => { dropdown.classList.toggle("show"); e.stopPropagation(); };
    window.onclick = (e) => { if (!e.target.matches('.dropbtn')) dropdown.classList.remove('show'); };

    // --- SIDEBAR ANIMATION LOGIC ---
    function toggleMenu(menuId) {
        const menu = document.getElementById(menuId);
        const parentItem = menu.previousElementSibling;
        
        // Toggle Open class
        if (menu.classList.contains('open')) {
            menu.classList.remove('open');
            parentItem.classList.remove('open');
        } else {
            // Close others if you want an accordion style (optional)
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('open'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('open'));
            
            menu.classList.add('open');
            parentItem.classList.add('open');
        }
    }

    // --- MOCK DATABASE ---
    const database = [
        { id: 1, type: 'images', sub: 'profile', title: 'Ruybic Avatar 2026', desc: 'Updated discord/osu! profile picture.', tags: ['avatar', 'ruybic'], date: '2026-03-24', img: 'https://i.imgur.com/1YJfjH6.png' },
        { id: 2, type: 'images', sub: 'ingame', title: 'First 500pp in Iraq', desc: 'Historical screenshot of the first 500pp play.', tags: ['milestone', 'gameplay', '500pp'], date: '2026-02-15', img: 'https://assets.ppy.sh/beatmaps/1181822/covers/cover.jpg' },
        { id: 3, type: 'images', sub: 'ingame', title: 'Tournament Grand Finals', desc: 'Lobby screenshot during the IQ Osu Cup.', tags: ['tournament', 'lobby'], date: '2025-11-10', img: 'https://assets.ppy.sh/beatmaps/1181822/covers/cover.jpg' },
        { id: 4, type: 'videos', sub: 'none', title: 'OIT Development Recap', desc: 'Screen recording of building the Termux bots.', tags: ['dev', 'telegram', 'python'], date: '2026-01-05', img: 'https://assets.ppy.sh/beatmaps/1181822/covers/cover.jpg' },
        { id: 5, type: 'text', sub: 'none', title: 'JSONovel Architecture', desc: 'Mind-map notes for the visual novel engine.', tags: ['dev', 'jsonovel', 'notes'], date: '2026-03-10', img: '' },
    ];

    // --- STATE MANAGEMENT ---
    let currentCategory = 'images'; // root category
    let currentSub = null;        // specific folder
    let searchTerm = '';

    // --- RENDER PIPELINE ---
    function updateBreadcrumbs() {
        const bc = document.getElementById('breadcrumbTrail');
        let html = `<span onclick="loadCategory('all')">Archive</span>`;
        
        if (currentCategory !== 'all') {
            const catName = currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1);
            if (currentSub) {
                html += ` > <span onclick="loadCategory('${currentCategory}')">${catName}</span>`;
                html += ` > <span class="current">${currentSub.toUpperCase()}</span>`;
            } else {
                html += ` > <span class="current">${catName}</span>`;
            }
        }
        bc.innerHTML = html;
    }

    function renderFolders(category) {
        // If clicking a main category that HAS subfolders (like images), show folders first
        const grid = document.getElementById('fileGrid');
        grid.innerHTML = '';
        
        if (category === 'images') {
            const folders = [
                { id: 'profile', name: 'Player Profiles', count: 1 },
                { id: 'ingame', name: 'In-Game Screenshots', count: 2 },
                { id: 'memes', name: 'Community Memes', count: 0 }
            ];

            folders.forEach((f, index) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.onclick = () => loadSubCategory('images', f.id);
                card.innerHTML = `
                    <div class="folder-icon">📁</div>
                    <div class="card-info">
                        <div class="card-title">${f.name}</div>
                        <div class="card-desc">Contains ${f.count} files</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    }

    function renderFiles() {
        const grid = document.getElementById('fileGrid');
        grid.innerHTML = '';

        // Filter Database
        let filtered = database.filter(item => {
            // Filter by Category/Sub
            let matchesCat = true;
            if (currentCategory !== 'all') {
                if (currentSub) {
                    matchesCat = (item.type === currentCategory && item.sub === currentSub);
                } else {
                    matchesCat = (item.type === currentCategory);
                }
            }

            // Filter by Search (Title or Tags)
            let matchesSearch = true;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                const inTitle = item.title.toLowerCase().includes(term);
                const inTags = item.tags.some(t => t.toLowerCase().includes(term));
                matchesSearch = inTitle || inTags;
            }

            return matchesCat && matchesSearch;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">No files found matching your criteria.</div>`;
            return;
        }

        filtered.forEach((file, index) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.style.animationDelay = `${index * 0.05}s`;
            
            // Build tags HTML
            const tagsHtml = file.tags.map(t => `<span class="tag">#${t}</span>`).join('');
            
            // Background image or placeholder
            const bgStyle = file.img ? `background-image: url('${file.img}')` : `background: #222; display: flex; align-items: center; justify-content: center; font-size: 30px;`;
            const previewContent = file.img ? '' : '📄';

            card.innerHTML = `
                <div class="file-preview" style="${bgStyle}">${previewContent}</div>
                <div class="card-info">
                    <div class="card-title">${file.title}</div>
                    <div class="tag-container">${tagsHtml}</div>
                    <div class="card-desc">${file.desc}</div>
                    <div class="card-meta">
                        <span class="date-badge">${file.date}</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- NAVIGATION CONTROLS ---
    function loadCategory(cat) {
        currentCategory = cat;
        currentSub = null;
        document.getElementById('searchInput').value = '';
        searchTerm = '';
        updateBreadcrumbs();

        // Highlight active menu
        document.querySelectorAll('.menu-item, .sub-item').forEach(el => el.classList.remove('active'));
        
        // If it's a category with folders, render folders. Otherwise render files.
        if (cat === 'images' && !searchTerm) {
            renderFolders(cat);
        } else {
            renderFiles();
        }
    }

    function loadSubCategory(cat, sub) {
        currentCategory = cat;
        currentSub = sub;
        document.getElementById('searchInput').value = '';
        searchTerm = '';
        updateBreadcrumbs();
        
        // Highlight active sub-item
        document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');

        renderFiles();
    }

    function handleSearch() {
        searchTerm = document.getElementById('searchInput').value;
        // If searching while looking at folders, force switch to file view to show results
        if (currentCategory === 'images' && !currentSub && searchTerm) {
             renderFiles();
        } else if (currentCategory === 'images' && !currentSub && !searchTerm) {
             renderFolders('images');
        } else {
             renderFiles();
        }
    }

    // --- INITIALIZATION ---
    loadCategory('images'); // Start on images folder view

</script>
</body>
</html>
