<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osu! Iraq Today | Mappers</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="OIT.png">
    <style>
        /* ... [Your Root and Header CSS from the scores page goes here] ... */
        :root { --osu-pink: #ff66aa; --dark-base: #1c1c21; --panel-bg: #2e2e38; --text-main: #ffffff; --text-muted: #888895; }
        body { background-color: var(--dark-base); color: var(--text-main); font-family: 'Exo 2', sans-serif; margin: 0; }
        
        /* [Header & Dropdown CSS Omitted for Brevity - Keep yours exactly the same] */

        .feed-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .mapper-grid { display: grid; gap: 16px; grid-template-columns: 1fr; }
        @media (min-width: 1024px) { .mapper-grid { grid-template-columns: repeat(5, 1fr); } }

        /* MAPPER CARD */
        .mapper-card { 
            background: var(--panel-bg); border-radius: 14px; overflow: hidden; 
            display: flex; flex-direction: column; transition: 0.3s; 
            border: 1px solid #3e3e4a; text-decoration: none; position: relative;
        }
        .mapper-card:hover { transform: translateY(-8px); border-color: var(--osu-pink); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        /* Top Mapper Highlight (Most Ranked Sets) */
        .mapper-card.top-mapper { border: 2px solid #ffd700; }
        .top-badge { position: absolute; bottom: 10px; left: 10px; background: #ffd700; color: #000; font-weight: 900; font-size: 11px; padding: 4px 10px; border-radius: 6px; z-index: 20; }

        .banner-header { width: 100%; height: 100px; background-size: cover; background-position: center; position: relative; }
        .banner-header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8)); }

        .stat-badge { position: absolute; top: 0; left: 0; z-index: 5; background: var(--osu-pink); color: white; padding: 5px 12px; border-radius: 0 0 12px 0; font-weight: 800; font-size: 13px; }
        .mapper-card.top-mapper .stat-badge { background: #ffd700; color: #000; }

        .card-body { padding: 15px; position: relative; flex-grow: 1; }
        .user-avatar { width: 60px; height: 60px; border-radius: 15px; border: 4px solid var(--panel-bg); position: absolute; top: -35px; right: 15px; z-index: 10; background: #333; }
        
        .mapper-name { font-weight: 800; color: white; font-size: 18px; margin-bottom: 2px; display: block; }
        .mapper-id { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; display: block; }

        .map-counts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; border-top: 1px solid #3e3e4a; padding-top: 10px; }
        .count-item { display: flex; flex-direction: column; font-size: 11px; color: var(--text-muted); }
        .count-num { color: white; font-weight: 800; font-size: 14px; }
    </style>
</head>
<body>

<div class="feed-container">
    <h2 class="section-label">IRAQI MAPPING COMMUNITY</h2>
    <div class="mapper-grid" id="mapperGrid">
        <div class="status-msg">Loading the builders of the community...</div>
    </div>
</div>

<script>
async function renderMappers() {
    const grid = document.getElementById('mapperGrid');
    try {
        // Fetch the JSON generated by the node script
        const response = await fetch('.data/mapping/iraqi_mappers.json');
        const data = await response.json();
        
        grid.innerHTML = '';

        data.mappers.forEach((mapper, index) => {
            const isTop = index === 0; // First mapper in list (sorted by ranked sets)
            const card = document.createElement('a');
            card.href = `https://osu.ppy.sh/users/${mapper.id}`;
            card.target = "_blank";
            card.className = isTop ? 'mapper-card top-mapper' : 'mapper-card';
            
            // Using a generic osu! banner or the user's avatar as a fallback
            const bannerImg = mapper.avatar; 

            card.innerHTML = `
                <div class="stat-badge">${mapper.statistics.ranked_sets} RANKED</div>
                <div class="banner-header" style="background-image: url('${bannerImg}'); filter: blur(2px) brightness(0.5);"></div>
                <div class="card-body">
                    <img src="${mapper.avatar}" class="user-avatar" alt="avatar">
                    <span class="mapper-name">${mapper.username}</span>
                    <span class="mapper-id">#${mapper.id}</span>
                    
                    <div class="map-counts">
                        <div class="count-item">
                            <span>Guest Diff</span>
                            <span class="count-num">${mapper.statistics.guest_sets}</span>
                        </div>
                        <div class="count-item">
                            <span>Unranked</span>
                            <span class="count-num">${mapper.statistics.unranked_sets}</span>
                        </div>
                    </div>
                    ${isTop ? `<div class="top-badge">MOST RANKED SETS</div>` : ''}
                </div>
            `;
            grid.appendChild(card);
        });
    } catch (e) {
        grid.innerHTML = '<div class="status-msg">Failed to load mapper data.</div>';
    }
}

renderMappers();
</script>
</body>
</html>
