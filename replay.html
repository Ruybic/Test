<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Osu! Iraq Replay Renderer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>

  <style>
    :root{
      --pink:#ff66aa;
      --red:#ce1126;
      --green:#007a3d;
      --bg:#0d111a;
      --soft:#9aa4bf;
      --ok:#7de39f;
      --err:#ff5757;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;
      background:radial-gradient(circle at 20% 20%, #202740, #0d111a 58%);
      color:#fff;font-family:"Exo 2",sans-serif;
    }
    #app{position:relative;width:100%;height:100%}

    #drop-zone{
      position:absolute;inset:16px;z-index:10;
      border:3px dashed rgba(255,255,255,.23);border-radius:18px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:20px;
      background:rgba(4,8,15,.56);
      transition:.2s;
    }
    #drop-zone.dragover{
      border-color:var(--pink);
      background:rgba(255,102,170,.09);
    }
    .title{
      margin:0;
      font-size:clamp(34px,7vw,64px);
      font-weight:900;letter-spacing:2px;text-transform:uppercase;
    }
    .title span{color:var(--pink)}
    .sub{
      margin-top:14px;max-width:960px;line-height:1.45;
      color:var(--soft);font-weight:700;font-size:clamp(14px,2.2vw,20px);
    }
    .sub b{color:#fff}
    .row{
      margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;
    }
    input[type="file"]{display:none}
    .btn{
      border:0;border-radius:10px;padding:12px 20px;cursor:pointer;
      font:800 14px "Exo 2",sans-serif;letter-spacing:.4px;text-transform:uppercase;
      transition:.15s;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-main{background:var(--pink);color:#fff}
    .btn-light{background:#fff;color:#111}
    #loading{
      margin-top:12px;display:none;color:var(--pink);
      font-size:20px;font-weight:900;animation:pulse 1.2s infinite;
    }
    @keyframes pulse{50%{opacity:.55}}
    #status{
      margin-top:10px;min-height:20px;max-width:980px;
      font:700 14px/1.4 "Exo 2",sans-serif;color:var(--soft);
    }
    #status.ok{color:var(--ok)}
    #status.error{color:var(--err)}

    #player{display:none;position:relative;width:100%;height:100%}
    #canvas{display:block;width:100%;height:100%;background:#000}

    .meta{
      position:absolute;top:14px;left:14px;z-index:8;
      max-width:min(86vw,620px);padding:9px 11px;
      background:rgba(0,0,0,.45);backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.2);border-radius:10px;
    }
    .meta-main{
      font:800 15px/1.2 "Exo 2",sans-serif;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .meta-sub{
      margin-top:3px;color:#b8c1da;font:700 12px/1.2 "Exo 2",sans-serif;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    .controls{
      position:absolute;left:0;right:0;bottom:0;z-index:12;
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      padding:42px 14px 14px;
      background:linear-gradient(180deg,transparent,rgba(0,0,0,.95) 65%);
    }
    .cbtn{
      border:2px solid rgba(255,255,255,.9);border-radius:8px;
      background:transparent;color:#fff;cursor:pointer;
      padding:10px 14px;font:800 12px "Exo 2",sans-serif;
      text-transform:uppercase;letter-spacing:.3px;
    }
    .cbtn:hover{background:#fff;color:#111}
    .cbtn:disabled{opacity:.45;cursor:not-allowed}
    #export-btn{border-color:var(--red);color:var(--red);margin-left:auto}
    #export-btn.active{background:var(--red);color:#fff}

    .timeline{
      flex:1;min-width:180px;height:6px;border-radius:999px;
      appearance:none;background:rgba(255,255,255,.25);
    }
    .timeline::-webkit-slider-thumb{
      appearance:none;width:16px;height:16px;border-radius:50%;
      background:var(--pink);border:2px solid #fff;
    }
    #time{
      min-width:120px;text-align:right;
      font:700 14px "Exo 2",sans-serif;
      font-variant-numeric:tabular-nums;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="drop-zone">
    <h1 class="title">OSU! <span>IRAQ</span> TODAY</h1>
    <p class="sub">
      Drop <b>.osr only</b> if map is cached.
      First time per map: drop <b>.osr + .osz</b> together, then replay-only works with song.
    </p>
    <div class="row">
      <label>
        <input id="file-input" type="file" multiple accept=".osr,.osz" />
        <span class="btn btn-main">Browse Files</span>
      </label>
      <button id="reset-btn" class="btn btn-light" type="button">Reset</button>
    </div>
    <div id="loading">Loading...</div>
    <div id="status"></div>
  </div>

  <div id="player">
    <canvas id="canvas"></canvas>
    <div class="meta">
      <div id="meta-main" class="meta-main">No replay loaded</div>
      <div id="meta-sub" class="meta-sub">Drop files to start</div>
    </div>
    <div class="controls">
      <button id="play-btn" class="cbtn" type="button">Play</button>
      <input id="seek" class="timeline" type="range" min="0" max="100" value="0" step="0.01" />
      <span id="time">0:00 / 0:00</span>
      <button id="export-btn" class="cbtn" type="button">Export Video</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ---------- Constants ---------- */
const FIELD = { w: 512, h: 384 };
const DB_NAME = "osu_replay_cache_v2";
const DB_STORE = "maps";

/* ---------- State ---------- */
const state = {
  loading: false,
  playing: false,
  exporting: false,
  raf: 0,
  lastTime: 0,

  replayFrames: [],
  mapObjects: [],
  replayStats: null,
  mapInfo: null,

  audio: new Audio(),
  audioUrl: "",
  audioCtx: null,
  audioSource: null,
  audioDest: null,

  recorder: null,
  chunks: [],

  lzmaPromise: null
};

/* ---------- Elements ---------- */
const el = {
  dropZone: document.getElementById("drop-zone"),
  fileInput: document.getElementById("file-input"),
  resetBtn: document.getElementById("reset-btn"),
  loading: document.getElementById("loading"),
  status: document.getElementById("status"),

  player: document.getElementById("player"),
  canvas: document.getElementById("canvas"),
  metaMain: document.getElementById("meta-main"),
  metaSub: document.getElementById("meta-sub"),

  playBtn: document.getElementById("play-btn"),
  seek: document.getElementById("seek"),
  time: document.getElementById("time"),
  exportBtn: document.getElementById("export-btn")
};

const ctx = el.canvas.getContext("2d", { alpha: false });
const css = getComputedStyle(document.documentElement);
const C = {
  pink: css.getPropertyValue("--pink").trim() || "#ff66aa",
  red: css.getPropertyValue("--red").trim() || "#ce1126",
  green: css.getPropertyValue("--green").trim() || "#007a3d"
};

/* ---------- UI helpers ---------- */
function setStatus(msg, type = "") {
  el.status.className = type;
  el.status.textContent = msg;
}
function setLoading(on, text = "Loading...") {
  state.loading = on;
  el.loading.style.display = on ? "block" : "none";
  el.loading.textContent = text;
  el.playBtn.disabled = on;
  el.exportBtn.disabled = on;
}
function formatTime(sec) {
  const t = Number.isFinite(sec) && sec > 0 ? sec : 0;
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}
function updateTime() {
  const cur = state.audio.currentTime || 0;
  const dur = Number.isFinite(state.audio.duration) ? state.audio.duration : 0;
  el.time.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
}
function updateExportBtn() {
  if (state.exporting) {
    el.exportBtn.textContent = "Stop Export";
    el.exportBtn.classList.add("active");
  } else {
    el.exportBtn.textContent = "Export Video";
    el.exportBtn.classList.remove("active");
  }
}
function resizeCanvas() {
  el.canvas.width = window.innerWidth;
  el.canvas.height = window.innerHeight;
  draw(state.audio.currentTime || 0);
}

/* ---------- LZMA loader ---------- */
function hasLZMA() {
  return !!(window.LZMA && typeof window.LZMA.decompress === "function");
}
function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.async = true;
    s.onload = resolve;
    s.onerror = () => reject(new Error(`Failed to load ${url}`));
    document.head.appendChild(s);
  });
}
async function ensureLZMA() {
  if (hasLZMA()) return;
  if (state.lzmaPromise) return state.lzmaPromise;

  const urls = [
    "https://cdn.jsdelivr.net/npm/lzma@2.3.2/src/lzma_worker-min.js",
    "https://unpkg.com/lzma@2.3.2/src/lzma_worker-min.js",
    "https://cdn.jsdelivr.net/npm/lzma@2.3.2/src/lzma_worker.js"
  ];

  state.lzmaPromise = (async () => {
    for (const url of urls) {
      try {
        await loadScript(url);
        if (hasLZMA()) return;
      } catch (_) {}
    }
    throw new Error("Could not load LZMA decoder.");
  })();

  return state.lzmaPromise;
}

/* ---------- IndexedDB cache ---------- */
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, { keyPath: "hash" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
  });
}
async function cacheSet(hash, oszBlob) {
  if (!("indexedDB" in window)) return;
  const db = await openDB();
  await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put({ hash, oszBlob, updatedAt: Date.now() });
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error || new Error("IndexedDB write failed"));
  });
  db.close();
}
async function cacheGet(hash) {
  if (!("indexedDB" in window)) return null;
  const db = await openDB();
  const row = await new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(hash);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error || new Error("IndexedDB read failed"));
  });
  db.close();
  return row;
}

/* ---------- Audio graph ---------- */
function ensureAudioGraph() {
  if (state.audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) throw new Error("Web Audio API not supported");

  state.audioCtx = new AC();
  state.audioSource = state.audioCtx.createMediaElementSource(state.audio);
  state.audioDest = state.audioCtx.createMediaStreamDestination();
  state.audioSource.connect(state.audioCtx.destination);
  state.audioSource.connect(state.audioDest);
}

/* ---------- Reset ---------- */
function clearApp() {
  if (state.raf) {
    cancelAnimationFrame(state.raf);
    state.raf = 0;
  }
  state.audio.pause();
  state.playing = false;
  state.exporting = false;
  updateExportBtn();

  if (state.recorder && state.recorder.state !== "inactive") {
    try { state.recorder.stop(); } catch (_) {}
  }
  state.recorder = null;
  state.chunks = [];

  if (state.audioUrl) {
    URL.revokeObjectURL(state.audioUrl);
    state.audioUrl = "";
  }

  if (state.audioSource) { try { state.audioSource.disconnect(); } catch (_) {} state.audioSource = null; }
  if (state.audioDest) { try { state.audioDest.disconnect(); } catch (_) {} state.audioDest = null; }
  if (state.audioCtx) { try { state.audioCtx.close(); } catch (_) {} state.audioCtx = null; }

  state.audio = new Audio();
  state.audio.preload = "auto";

  state.replayFrames = [];
  state.mapObjects = [];
  state.replayStats = null;
  state.mapInfo = null;
  state.lastTime = 0;

  el.player.style.display = "none";
  el.dropZone.style.display = "flex";
  el.seek.max = "100";
  el.seek.value = "0";
  updateTime();
  draw(0);
}

/* ---------- Parsers ---------- */
function normMd5(v) {
  return String(v || "").trim().toLowerCase();
}
function parseOSR(buffer) {
  const view = new DataView(buffer);
  const decoder = new TextDecoder("utf-8");
  let o = 0;

  function need(n) { if (o + n > view.byteLength) throw new Error("Invalid .osr (EOF)"); }
  function b() { need(1); const v = view.getUint8(o); o += 1; return v; }
  function u16() { need(2); const v = view.getUint16(o, true); o += 2; return v; }
  function i32() { need(4); const v = view.getInt32(o, true); o += 4; return v; }
  function u32() { need(4); const v = view.getUint32(o, true); o += 4; return v; }

  function s() {
    const m = b();
    if (m === 0x00) return "";
    if (m !== 0x0b) throw new Error("Invalid .osr string marker");
    let len = 0, shift = 0;
    while (true) {
      const x = b();
      len |= (x & 0x7f) << shift;
      if ((x & 0x80) === 0) break;
      shift += 7;
      if (shift > 35) throw new Error("Invalid .osr string length");
    }
    need(len);
    const out = decoder.decode(new Uint8Array(buffer, o, len));
    o += len;
    return out;
  }

  const mode = b();
  const version = i32();
  const mapMd5 = s();
  const player = s();
  const replayMd5 = s();

  const count300 = u16();
  const count100 = u16();
  const count50 = u16();
  const countGeki = u16();
  const countKatu = u16();
  const countMiss = u16();
  const score = u32();
  const maxCombo = u16();
  const perfect = b();
  const mods = i32();
  const lifeBar = s();

  need(8); o += 8; // timestamp
  const len = i32();
  if (len < 0) throw new Error("Invalid replay payload length");
  need(len);
  const compressedData = new Uint8Array(buffer, o, len);

  return {
    mode, version, mapMd5, player, replayMd5,
    count300, count100, count50, countGeki, countKatu, countMiss,
    score, maxCombo, perfect, mods, lifeBar, compressedData
  };
}
function parseReplayText(text) {
  const frames = [];
  let ms = 0;
  const chunks = String(text || "").split(",");
  for (const raw of chunks) {
    if (!raw) continue;
    const p = raw.split("|");
    if (p.length < 4) continue;

    const delta = Number(p[0]);
    if (!Number.isFinite(delta)) continue;
    if (delta < 0) continue; // ignores seed frame like -12345|0|0|...
    ms += delta;

    const x = Number(p[1]);
    const y = Number(p[2]);
    if (!Number.isFinite(x) || !Number.isFinite(y)) continue;

    if (x < -32 || x > 544 || y < -32 || y > 416) continue;
    frames.push({
      time: ms / 1000,
      x: Math.max(0, Math.min(FIELD.w, x)),
      y: Math.max(0, Math.min(FIELD.h, y))
    });
  }
  return frames;
}
function decodeReplay(compressed) {
  if (!hasLZMA()) throw new Error("LZMA not loaded");
  return new Promise((resolve, reject) => {
    window.LZMA.decompress(compressed, (result, error) => {
      if (error) {
        reject(new Error(typeof error === "string" ? error : "Replay decompression failed"));
        return;
      }
      let text = "";
      if (typeof result === "string") text = result;
      else if (result instanceof Uint8Array || Array.isArray(result)) text = new TextDecoder("utf-8").decode(new Uint8Array(result));
      else text = String(result ?? "");
      const frames = parseReplayText(text);
      if (!frames.length) {
        reject(new Error("Replay decoded but no cursor frames detected"));
        return;
      }
      resolve(frames);
    });
  });
}
function parseOSU(text) {
  const out = {
    general: { audioFilename: "" },
    metadata: { artist: "", title: "", version: "" },
    diff: { cs: 4, ar: 5 },
    hitObjects: []
  };
  const lines = String(text || "").split(/\r?\n/);
  let sec = "";

  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith("//")) continue;

    if (line.startsWith("[") && line.endsWith("]")) {
      sec = line;
      continue;
    }

    if (sec === "[General]" || sec === "[Metadata]" || sec === "[Difficulty]") {
      const idx = line.indexOf(":");
      if (idx > 0) {
        const key = line.slice(0, idx).trim();
        const value = line.slice(idx + 1).trim();

        if (sec === "[General]" && key === "AudioFilename") out.general.audioFilename = value;
        if (sec === "[Metadata]") {
          if (key === "Artist") out.metadata.artist = value;
          else if (key === "Title") out.metadata.title = value;
          else if (key === "Version") out.metadata.version = value;
        }
        if (sec === "[Difficulty]") {
          if (key === "CircleSize") out.diff.cs = Number(value) || out.diff.cs;
          else if (key === "ApproachRate") out.diff.ar = Number(value) || out.diff.ar;
        }
      }
    }

    if (sec === "[HitObjects]") {
      const p = line.split(",");
      if (p.length < 5) continue;

      const x = Number(p[0]);
      const y = Number(p[1]);
      const t = Number(p[2]) / 1000;
      const type = Number(p[3]);
      if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(t) || !Number.isFinite(type)) continue;

      let objType = "circle";
      let endTime = t;
      if ((type & 8) > 0) {
        objType = "spinner";
        const e = Number(p[5]);
        endTime = Number.isFinite(e) ? e / 1000 : t;
      } else if ((type & 2) > 0) {
        objType = "slider";
      }

      out.hitObjects.push({ x, y, time: t, endTime, type: objType });
    }
  }

  out.hitObjects.sort((a, b) => a.time - b.time);
  return out;
}
function chooseAudioEntry(zipFiles, preferredAudio, osuPath) {
  const all = Object.values(zipFiles).filter((f) => !f.dir);
  const audio = all.filter((f) => /\.(mp3|ogg|wav|m4a|aac)$/i.test(f.name));
  if (!audio.length) return null;

  const norm = (v) => String(v || "").replace(/\\/g, "/").toLowerCase();
  const pref = norm(preferredAudio);

  if (pref) {
    const exact = audio.find((a) => norm(a.name) === pref);
    if (exact) return exact;
    const base = pref.split("/").pop();
    const byBase = audio.find((a) => norm(a.name).split("/").pop() === base);
    if (byBase) return byBase;
  }

  const mapPath = norm(osuPath);
  const slash = mapPath.lastIndexOf("/");
  if (slash > -1) {
    const folder = mapPath.slice(0, slash + 1);
    const sameFolder = audio.find((a) => norm(a.name).startsWith(folder));
    if (sameFolder) return sameFolder;
  }

  return audio[0];
}
async function loadMapPack(oszBlob, targetMd5) {
  const zip = await window.JSZip.loadAsync(oszBlob);
  const osuFiles = Object.values(zip.files).filter((f) => !f.dir && f.name.toLowerCase().endsWith(".osu"));
  if (!osuFiles.length) throw new Error("No .osu files found in .osz");

  const parsed = [];
  for (const f of osuFiles) {
    const buf = await f.async("arraybuffer");
    const md5 = normMd5(window.SparkMD5.ArrayBuffer.hash(buf));
    parsed.push({
      path: f.name,
      name: f.name.split("/").pop().replace(/\.osu$/i, ""),
      md5,
      parsed: parseOSU(new TextDecoder("utf-8").decode(buf))
    });
  }

  let selected = parsed.find((m) => m.md5 === normMd5(targetMd5)) || null;
  let exact = true;
  if (!selected) {
    selected = parsed[0];
    exact = false;
  }

  const audioEntry = chooseAudioEntry(zip.files, selected.parsed.general.audioFilename, selected.path);
  if (!audioEntry) throw new Error("No audio found in .osz");

  const audioBlob = await audioEntry.async("blob");
  return { selected, audioBlob, exact };
}

/* ---------- Render ---------- */
function arPreempt(ar) {
  if (ar < 5) return (1800 - 120 * ar) / 1000;
  return (1200 - 150 * (ar - 5)) / 1000;
}
function cursorAt(t) {
  const a = state.replayFrames;
  if (!a.length) return { x: FIELD.w / 2, y: FIELD.h / 2 };
  if (t <= a[0].time) return { x: a[0].x, y: a[0].y };
  const last = a[a.length - 1];
  if (t >= last.time) return { x: last.x, y: last.y };

  let lo = 0, hi = a.length - 1;
  while (lo <= hi) {
    const m = (lo + hi) >> 1;
    if (a[m].time <= t) lo = m + 1;
    else hi = m - 1;
  }

  const i = Math.max(0, hi);
  const p = a[i];
  const q = a[Math.min(i + 1, a.length - 1)];
  if (!q || q.time <= p.time) return { x: p.x, y: p.y };

  const u = (t - p.time) / (q.time - p.time);
  return { x: p.x + (q.x - p.x) * u, y: p.y + (q.y - p.y) * u };
}
function draw(t) {
  const w = el.canvas.width, h = el.canvas.height;
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);

  const scale = Math.min(w / FIELD.w, h / FIELD.h) * 0.82;
  const ox = (w - FIELD.w * scale) / 2;
  const oy = (h - FIELD.h * scale) / 2;

  ctx.strokeStyle = "rgba(255,255,255,.08)";
  ctx.lineWidth = 1;
  ctx.strokeRect(ox, oy, FIELD.w * scale, FIELD.h * scale);

  if (state.mapObjects.length) {
    const cs = state.mapInfo?.diff?.cs ?? 4;
    const rad = (54.4 - 4.48 * cs) * scale;
    const pre = arPreempt(state.mapInfo?.diff?.ar ?? 5);
    const palette = [C.red, C.green, "#fff"];

    const st = Math.max(0, t - 0.05);
    const et = t + pre + 0.25;

    for (let i = 0; i < state.mapObjects.length; i += 1) {
      const o = state.mapObjects[i];
      if (o.time < st || o.time > et) continue;
      const col = palette[i % palette.length];

      if (o.type === "spinner") {
        const duration = Math.max(0.001, o.endTime - o.time);
        const p = Math.max(0, Math.min(1, (t - o.time) / duration));
        const r = Math.min(w, h) * 0.24;
        const x = ox + (FIELD.w / 2) * scale;
        const y = oy + (FIELD.h / 2) * scale;

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(255,255,255,.25)";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y, r, -Math.PI * 0.5, -Math.PI * 0.5 + Math.PI * 2 * p);
        ctx.lineWidth = 6;
        ctx.strokeStyle = col;
        ctx.stroke();
        continue;
      }

      const x = ox + o.x * scale;
      const y = oy + o.y * scale;
      const until = o.time - t;
      const prog = 1 - Math.max(0, until) / pre;
      const ar = rad + rad * 1.5 * (1 - Math.max(0, Math.min(1, prog)));

      ctx.beginPath();
      ctx.arc(x, y, rad, 0, Math.PI * 2);
      ctx.fillStyle = "#1c1f2b";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, rad, 0, Math.PI * 2);
      ctx.lineWidth = Math.max(2, 4 * scale);
      ctx.strokeStyle = col;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, ar, 0, Math.PI * 2);
      ctx.lineWidth = Math.max(1, 2 * scale);
      ctx.strokeStyle = col;
      ctx.stroke();
    }
  }

  const cur = cursorAt(t);
  const cx = ox + cur.x * scale;
  const cy = oy + cur.y * scale;

  ctx.beginPath();
  ctx.arc(cx, cy, 19, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,102,170,.36)";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, 11, 0, Math.PI * 2);
  ctx.fillStyle = "#fff";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = C.pink;
  ctx.fill();
}
function startLoop() {
  if (state.raf) return;
  const step = () => {
    state.raf = requestAnimationFrame(step);
    if (!state.mapObjects.length) return;

    const d = Number.isFinite(state.audio.duration) ? state.audio.duration : 0;
    state.lastTime = state.audio.currentTime || 0;
    draw(state.lastTime);

    el.seek.value = String(Math.min(state.lastTime, d || 0));
    updateTime();
  };
  state.raf = requestAnimationFrame(step);
}

/* ---------- Export ---------- */
function pickMime() {
  if (!window.MediaRecorder) return "";
  const list = ["video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus", "video/webm"];
  for (const m of list) if (MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
function startExport() {
  if (!window.MediaRecorder) throw new Error("MediaRecorder not supported");
  if (!state.audioDest) throw new Error("Audio pipeline not ready");

  const canvasTracks = el.canvas.captureStream(60).getVideoTracks();
  const audioTracks = state.audioDest.stream.getAudioTracks();
  const stream = new MediaStream([...canvasTracks, ...audioTracks]);

  const mime = pickMime();
  state.recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
  state.chunks = [];

  state.recorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) state.chunks.push(e.data);
  };
  state.recorder.onerror = (e) => {
    setStatus(`Export error: ${e.error?.message || "unknown"}`, "error");
  };
  state.recorder.onstop = () => {
    const blob = new Blob(state.chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "OsuIraqToday_Export.webm";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    state.chunks = [];
  };

  state.recorder.start();
  state.exporting = true;
  updateExportBtn();
}
function stopExport() {
  if (!state.exporting) return;
  state.exporting = false;
  updateExportBtn();
  if (state.recorder && state.recorder.state !== "inactive") state.recorder.stop();
}

/* ---------- Main load ---------- */
async function processFiles(fileList) {
  const files = Array.from(fileList || []);
  const osr = files.find((f) => f.name.toLowerCase().endsWith(".osr"));
  const osz = files.find((f) => f.name.toLowerCase().endsWith(".osz")) || null;
  if (!osr) {
    setStatus("Please drop at least one .osr file.", "error");
    return;
  }

  clearApp();
  el.fileInput.value = "";

  try {
    setLoading(true, "Loading LZMA decoder...");
    await ensureLZMA();

    setLoading(true, "Reading replay (.osr)...");
    const replay = parseOSR(await osr.arrayBuffer());
    if (replay.mode !== 0) throw new Error("Only osu!standard (mode=0) is supported.");

    setLoading(true, "Decoding cursor movement...");
    const frames = await decodeReplay(replay.compressedData);

    const hash = normMd5(replay.mapMd5);
    let oszBlob = osz || null;
    let source = "dropped .osz";

    if (!oszBlob) {
      setLoading(true, "Searching local cache...");
      const cached = await cacheGet(hash);
      if (!cached || !cached.oszBlob) {
        throw new Error("No cached map for this replay. First time: drop .osr + matching .osz together.");
      }
      oszBlob = cached.oszBlob;
      source = "local cache";
    }

    setLoading(true, "Reading map and audio...");
    const pack = await loadMapPack(oszBlob, replay.mapMd5);
    if (!pack.exact) setStatus("Hash mismatch in package; fallback to first difficulty.", "");

    if (osz) {
      try { await cacheSet(hash, osz); } catch (_) {}
    }

    state.replayStats = replay;
    state.replayFrames = frames;
    state.mapObjects = pack.selected.parsed.hitObjects;
    state.mapInfo = {
      displayName: pack.selected.name,
      metadata: pack.selected.parsed.metadata,
      diff: pack.selected.parsed.diff
    };

    if (!state.mapObjects.length) throw new Error("Beatmap has no hit objects.");

    state.audioUrl = URL.createObjectURL(pack.audioBlob);
    state.audio.src = state.audioUrl;
    state.audio.addEventListener("loadedmetadata", () => {
      const d = Number.isFinite(state.audio.duration) ? state.audio.duration : 0;
      el.seek.max = String(d || 0);
      el.seek.value = "0";
      updateTime();
    });
    state.audio.addEventListener("ended", () => {
      state.playing = false;
      el.playBtn.textContent = "Play";
      if (state.exporting) stopExport();
    });

    ensureAudioGraph();

    const m = state.mapInfo.metadata || {};
    const title = [m.artist, m.title].filter(Boolean).join(" - ") || "Beatmap Loaded";
    const ver = m.version || state.mapInfo.displayName || "Unknown Difficulty";
    el.metaMain.textContent = title;
    el.metaSub.textContent = ver;

    el.dropZone.style.display = "none";
    el.player.style.display = "block";

    setLoading(false);
    setStatus(`Loaded ${frames.length.toLocaleString()} replay frames (${source}).`, "ok");

    startLoop();
    if (state.audioCtx && state.audioCtx.state === "suspended") {
      await state.audioCtx.resume();
    }
    await state.audio.play();
    state.playing = true;
    el.playBtn.textContent = "Pause";
  } catch (err) {
    console.error(err);
    setLoading(false);
    setStatus(err.message || "Failed to load replay.", "error");
  }
}

/* ---------- Events ---------- */
function setupDragDrop() {
  function prevent(e) { e.preventDefault(); e.stopPropagation(); }
  ["dragenter", "dragover", "dragleave", "drop"].forEach((n) => el.dropZone.addEventListener(n, prevent, false));
  ["dragenter", "dragover"].forEach((n) => el.dropZone.addEventListener(n, () => el.dropZone.classList.add("dragover")));
  ["dragleave", "drop"].forEach((n) => el.dropZone.addEventListener(n, () => el.dropZone.classList.remove("dragover")));
  el.dropZone.addEventListener("drop", (e) => processFiles(e.dataTransfer.files));
}

window.addEventListener("resize", resizeCanvas);
el.fileInput.addEventListener("change", (e) => processFiles(e.target.files));
el.resetBtn.addEventListener("click", () => {
  clearApp();
  setLoading(false);
  setStatus("Drop .osr only (if cached), or .osr + .osz for first run.", "");
});
el.playBtn.addEventListener("click", async () => {
  if (!state.mapObjects.length || state.loading) return;

  if (state.playing) {
    state.audio.pause();
    state.playing = false;
    el.playBtn.textContent = "Play";
  } else {
    try {
      if (state.audioCtx && state.audioCtx.state === "suspended") await state.audioCtx.resume();
      await state.audio.play();
      state.playing = true;
      el.playBtn.textContent = "Pause";
    } catch (_) {
      setStatus("Autoplay blocked. Press Play again.", "");
    }
  }
});
el.seek.addEventListener("input", (e) => {
  if (!state.mapObjects.length) return;
  const t = Number(e.target.value);
  if (!Number.isFinite(t)) return;
  state.audio.currentTime = t;
  draw(t);
  updateTime();
});
el.exportBtn.addEventListener("click", async () => {
  if (!state.mapObjects.length || state.loading) return;
  try {
    if (state.exporting) {
      stopExport();
      return;
    }
    if (state.audioCtx && state.audioCtx.state === "suspended") await state.audioCtx.resume();
    startExport();
    state.audio.currentTime = 0;
    await state.audio.play();
    state.playing = true;
    el.playBtn.textContent = "Pause";
  } catch (err) {
    console.error(err);
    setStatus(err.message || "Failed to start export.", "error");
    stopExport();
  }
});

/* ---------- Init ---------- */
resizeCanvas();
setupDragDrop();
setStatus("Drop .osr only (if cached), or .osr + .osz for first run.", "");
</script>
</body>
</html>
