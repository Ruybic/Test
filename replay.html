<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osu! Iraq Today | Custom Renderer</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { 
            --osu-pink: #ff66aa; 
            --iraq-red: #CE1126; 
            --iraq-green: #007A3D; 
            --bg-color: #121216; 
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: white; font-family: 'Exo 2', sans-serif; overflow: hidden; }

        /* --- DRAG & DROP & UPLOAD ZONE --- */
        #drop-zone {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px dashed #333; margin: 20px; border-radius: 20px; transition: 0.3s; z-index: 100; background: var(--bg-color);
        }
        #drop-zone.dragover { border-color: var(--osu-pink); background: rgba(255, 102, 170, 0.05); }
        .drop-title { font-size: 36px; font-weight: 900; letter-spacing: 2px; }
        .drop-title span { color: var(--osu-pink); }
        .drop-sub { color: #888; margin-top: 10px; font-size: 18px; font-weight: 700; text-align: center; line-height: 1.5; margin-bottom: 20px;}
        
        .upload-btn { background: var(--osu-pink); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-family: 'Exo 2'; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .upload-btn:hover { background: #ff88bb; transform: scale(1.05); }
        input[type="file"] { display: none; }

        .iraq-colors { display: flex; gap: 10px; margin-top: 25px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; }

        /* --- PLAYER UI --- */
        #player-ui { display: none; width: 100%; height: 100%; position: relative; }
        #game-canvas { width: 100%; height: 100%; display: block; background: #000; }

        .controls {
            position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 40px 20px 20px 20px; display: flex; align-items: center; gap: 15px; box-sizing: border-box; z-index: 200;
        }
        
        button { background: transparent; border: 2px solid white; color: white; padding: 10px 20px; border-radius: 6px; font-family: 'Exo 2'; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 14px; }
        button:hover { background: white; color: black; }
        #export-btn { border-color: var(--iraq-red); color: var(--iraq-red); margin-left: auto; }
        #export-btn:hover { background: var(--iraq-red); color: white; }

        .timeline { flex: 1; -webkit-appearance: none; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; cursor: pointer; }
        .timeline::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--osu-pink); }
        #time-display { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 14px; width: 110px; text-align: right; }
        
        /* Overlays */
        .overlay-screen { position: absolute; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 50; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .overlay-screen.active { opacity: 1; pointer-events: all; }

        #loading-text { display: none; color: var(--osu-pink); font-weight: 800; font-size: 24px; margin-top: 20px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="drop-zone">
        <div class="drop-title">OSU! <span>IRAQ</span> TODAY</div>
        <div class="drop-sub">Select or Drop your <b>.osz</b> and <b>.osr</b> files together.</div>
        
        <label>
            <input type="file" id="file-input" multiple accept=".osz,.osr">
            <div class="upload-btn">Browse Files</div>
        </label>

        <div class="iraq-colors">
            <div class="dot" style="background: var(--iraq-red);"></div>
            <div class="dot" style="background: white;"></div>
            <div class="dot" style="background: black; border: 1px solid #333;"></div>
            <div class="dot" style="background: var(--iraq-green);"></div>
        </div>
        <div id="loading-text">Extracting & Parsing...</div>
    </div>

    <div id="player-ui">
        <canvas id="game-canvas"></canvas>
        
        <div id="intro-screen" class="overlay-screen">
            <img src="https://i.imgur.com/1YJfjH6.png" style="width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,102,170,0.4));">
            <h1 style="color: var(--osu-pink); letter-spacing: 5px; margin: 0;">OSU! IRAQ TODAY</h1>
            <p style="color: #888; font-weight: 600; letter-spacing: 2px;">COMMUNITY SHOWCASE</p>
        </div>
        
        <div id="stats-screen" class="overlay-screen">
            <h2 id="player-name-display" style="color: #888; font-size: 24px; margin: 0;">Player</h2>
            <h1 style="color: white; font-size: 48px; margin-bottom: 0; margin-top: 10px;">FINAL SCORE</h1>
            <h2 id="final-score" style="color: var(--osu-pink); font-size: 72px; margin: 10px 0;">0</h2>
            <div style="display: flex; gap: 30px; margin-top: 20px; color: #888; font-size: 28px; font-weight: 800;">
                <span>300: <b id="stat-300" style="color: white;">0</b></span>
                <span>100: <b id="stat-100" style="color: var(--iraq-green);">0</b></span>
                <span>50: <b id="stat-50" style="color: var(--iraq-red);">0</b></span>
                <span>Miss: <b id="stat-miss" style="color: red;">0</b></span>
            </div>
            <div style="margin-top: 15px; font-size: 20px; color: #aaa;">Max Combo: <b id="stat-combo" style="color: white;">0x</b></div>
        </div>

        <div id="outro-screen" class="overlay-screen" style="border-bottom: 15px solid var(--osu-pink); box-sizing: border-box;">
            <h1 style="color: white; font-size: 56px; margin: 0;">Thanks for watching!</h1>
            <p style="color: var(--osu-pink); font-size: 24px; font-weight: 600;">Built with ❤️ for the Iraqi Community</p>
        </div>

        <div class="controls">
            <button id="play-btn">▶ PLAY</button>
            <input type="range" id="seek-bar" class="timeline" min="0" max="100" value="0" step="0.1">
            <span id="time-display">0:00 / 0:00</span>
            <button id="export-btn">⏺ RECORD VIDEO</button>
        </div>
    </div>

    <script>
        // --- CORE VARIABLES ---
        let mapData = [], replayStats = {};
        let audioBlobUrl = null;
        let audioElement = new Audio();
        let isPlaying = false, isRecording = false;
        let sequencePhase = 'intro'; // intro -> game -> stats -> outro
        
        // Auto-Cursor position
        let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2;

        let audioContext, destNode, mediaSource, mediaRecorder;
        let recordedChunks = [];

        // UI
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loadingText = document.getElementById('loading-text');
        const playerUi = document.getElementById('player-ui');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('play-btn');
        const seekBar = document.getElementById('seek-bar');
        const timeDisplay = document.getElementById('time-display');
        const exportBtn = document.getElementById('export-btn');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- FILE PARSERS ---

        // 1. Parses the binary .osr file to get the real score and player stats
        function parseOSR(buffer) {
            let view = new DataView(buffer);
            let offset = 0;

            function readByte() { let v = view.getUint8(offset); offset += 1; return v; }
            function readShort() { let v = view.getUint16(offset, true); offset += 2; return v; }
            function readInt() { let v = view.getUint32(offset, true); offset += 4; return v; }
            function readString() {
                let head = readByte();
                if (head === 0x00) return "";
                if (head === 0x0b) {
                    let length = 0, shift = 0;
                    while (true) {
                        let byte = readByte();
                        length |= (byte & 0x7F) << shift;
                        if ((byte & 0x80) === 0) break;
                        shift += 7;
                    }
                    let str = new TextDecoder().decode(new Uint8Array(buffer, offset, length));
                    offset += length;
                    return str;
                }
                return "";
            }

            let mode = readByte();
            let version = readInt();
            let mapMd5 = readString();
            let player = readString();
            let replayMd5 = readString();
            
            let count300 = readShort();
            let count100 = readShort();
            let count50 = readShort();
            let countGeki = readShort();
            let countKatu = readShort();
            let countMiss = readShort();
            let score = readInt();
            let maxCombo = readShort();

            return { player, score, count300, count100, count50, countMiss, maxCombo };
        }

        // 2. Parses the .osu text to get actual hit circle locations and times
        function parseOSU(text) {
            let hitObjects = [];
            let inObjects = false;
            let lines = text.split('\n');
            for(let line of lines) {
                line = line.trim();
                if (line === '[HitObjects]') { inObjects = true; continue; }
                if (inObjects && line !== '' && !line.startsWith('//')) {
                    let parts = line.split(',');
                    if (parts.length >= 5) {
                        hitObjects.push({
                            x: parseInt(parts[0]),
                            y: parseInt(parts[1]),
                            time: parseInt(parts[2]) / 1000 // Convert ms to seconds
                        });
                    }
                }
            }
            return hitObjects.sort((a,b) => a.time - b.time);
        }

        // --- INPUT HANDLING ---
        function handleFiles(files) {
            loadingText.style.display = 'block';
            let oszFile = null, osrFile = null;

            for(let file of files) {
                if (file.name.toLowerCase().endsWith('.osz')) oszFile = file;
                if (file.name.toLowerCase().endsWith('.osr')) osrFile = file;
            }

            if (!oszFile || !osrFile) {
                alert("Please select both an .osz AND an .osr file!");
                loadingText.style.display = 'none';
                return;
            }

            processFiles(oszFile, osrFile);
        }

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });

        async function processFiles(oszFile, osrFile) {
            try {
                // Parse OSR for Real Stats
                let osrBuffer = await osrFile.arrayBuffer();
                replayStats = parseOSR(osrBuffer);

                // Unzip OSZ
                const zip = await JSZip.loadAsync(oszFile);
                let audioName = Object.keys(zip.files).find(n => n.endsWith('.mp3') || n.endsWith('.ogg'));
                let osuName = Object.keys(zip.files).find(n => n.endsWith('.osu'));

                if(!audioName || !osuName) throw new Error("Missing .osu or audio inside .osz");

                const audioBlob = await zip.file(audioName).async("blob");
                audioBlobUrl = URL.createObjectURL(audioBlob);
                
                let osuText = await zip.file(osuName).async("text");
                mapData = parseOSU(osuText);

                initPlayer();
            } catch (error) {
                console.error(error);
                alert("Error extracting files. Ensure valid format.");
                loadingText.style.display = 'none';
            }
        }

        // --- PLAYER INIT & LOGIC ---
        function initPlayer() {
            dropZone.style.display = 'none';
            playerUi.style.display = 'block';
            
            // Populate Real Stats on UI
            document.getElementById('player-name-display').innerText = `Player: ${replayStats.player}`;
            document.getElementById('final-score').innerText = replayStats.score.toLocaleString();
            document.getElementById('stat-300').innerText = replayStats.count300;
            document.getElementById('stat-100').innerText = replayStats.count100;
            document.getElementById('stat-50').innerText = replayStats.count50;
            document.getElementById('stat-miss').innerText = replayStats.countMiss;
            document.getElementById('stat-combo').innerText = replayStats.maxCombo + "x";

            audioElement.src = audioBlobUrl;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            mediaSource = audioContext.createMediaElementSource(audioElement);
            destNode = audioContext.createMediaStreamDestination();
            
            mediaSource.connect(destNode);
            mediaSource.connect(audioContext.destination);

            audioElement.addEventListener('loadedmetadata', () => {
                seekBar.max = audioElement.duration;
                updateTimeDisplay();
                startIntroSequence();
            });
        }

        function startIntroSequence() {
            sequencePhase = 'intro';
            document.getElementById('intro-screen').classList.add('active');
            
            setTimeout(() => {
                document.getElementById('intro-screen').classList.remove('active');
                sequencePhase = 'game';
                audioContext.resume();
                audioElement.play();
                isPlaying = true;
                playBtn.innerText = "⏸ PAUSE";
                renderLoop();
            }, 3000);
        }

        function endSequence() {
            isPlaying = false;
            sequencePhase = 'stats';
            document.getElementById('stats-screen').classList.add('active');
            
            // Wait EXACTLY 7 seconds before showing the outro
            setTimeout(() => {
                document.getElementById('stats-screen').classList.remove('active');
                document.getElementById('outro-screen').classList.add('active');
                sequencePhase = 'outro';

                if(isRecording) exportBtn.click(); // Auto-stop recording
            }, 7000); 
        }

        // --- GAME RENDERER (Reads actual map coordinates) ---
        function renderLoop() {
            if (!isPlaying && sequencePhase !== 'game') return;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let time = audioElement.currentTime;

            // Osu! playfield is 512x384. Scale it to fit the screen.
            let osuWidth = 512;
            let osuHeight = 384;
            let scale = Math.min(canvas.width / osuWidth, canvas.height / osuHeight) * 0.8;
            let offsetX = (canvas.width - osuWidth * scale) / 2;
            let offsetY = (canvas.height - osuHeight * scale) / 2;

            // Approach Rate Timing (1.2 seconds for visibility)
            let arTime = 1.2; 
            
            // Find objects that should be on screen right now
            let visibleObjects = mapData.filter(obj => time >= obj.time - arTime && time <= obj.time + 0.1);
            let activeTarget = null;

            // Draw Real Map Objects
            for (let i = 0; i < visibleObjects.length; i++) {
                let obj = visibleObjects[i];
                let screenX = offsetX + obj.x * scale;
                let screenY = offsetY + obj.y * scale;
                
                let timeDiff = obj.time - time;
                if (timeDiff < 0) timeDiff = 0; // Already hit
                
                let progress = 1 - (timeDiff / arTime);
                
                // Assign Iraq colors sequentially
                let colors = ['var(--iraq-red)', 'var(--iraq-green)', 'white'];
                let color = colors[i % colors.length];

                // Draw hit circle
                ctx.beginPath();
                ctx.arc(screenX, screenY, 40 * scale, 0, Math.PI * 2);
                ctx.fillStyle = '#1c1c21';
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = color;
                ctx.stroke();

                // Draw approach circle shrinking
                let approachRadius = (40 * scale) + (60 * scale * (1 - progress));
                ctx.beginPath();
                ctx.arc(screenX, screenY, approachRadius, 0, Math.PI * 2);
                ctx.lineWidth = 2;
                ctx.strokeStyle = color;
                ctx.stroke();

                if (i === 0) activeTarget = {x: screenX, y: screenY}; // First object is current target
            }

            // Move cursor to actual hit objects smoothly
            if (activeTarget) {
                cursorX += (activeTarget.x - cursorX) * 0.3;
                cursorY += (activeTarget.y - cursorY) * 0.3;
            }

            // Draw Cursor
            ctx.beginPath();
            ctx.arc(cursorX, cursorY, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 102, 170, 0.3)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cursorX, cursorY, 12, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();

            seekBar.value = time;
            updateTimeDisplay();

            if (time >= audioElement.duration && audioElement.duration > 0) {
                endSequence();
                return;
            }

            requestAnimationFrame(renderLoop);
        }

        // --- CONTROLS ---
        playBtn.addEventListener('click', () => {
            if(sequencePhase !== 'game') return;
            if (isPlaying) { audioElement.pause(); isPlaying = false; playBtn.innerText = "▶ PLAY"; } 
            else { audioContext.resume(); audioElement.play(); isPlaying = true; playBtn.innerText = "⏸ PAUSE"; renderLoop(); }
        });

        seekBar.addEventListener('input', (e) => {
            if(sequencePhase !== 'game') return;
            audioElement.currentTime = e.target.value;
            updateTimeDisplay();
            if(!isPlaying) { isPlaying = true; renderLoop(); audioElement.pause(); isPlaying = false; } 
        });

        function formatTime(seconds) { let m = Math.floor(seconds / 60); let s = Math.floor(seconds % 60).toString().padStart(2, '0'); return `${m}:${s}`; }
        function updateTimeDisplay() { timeDisplay.innerText = `${formatTime(audioElement.currentTime)} / ${formatTime(audioElement.duration || 0)}`; }

        // --- VIDEO EXPORT ---
        exportBtn.addEventListener('click', () => {
            if (isRecording) {
                mediaRecorder.stop();
                exportBtn.innerText = "⏺ RECORD VIDEO";
                exportBtn.style.color = "var(--iraq-red)";
                exportBtn.style.background = "transparent";
                isRecording = false;
                return;
            }

            const canvasStream = canvas.captureStream(60);
            const audioStream = destNode.stream;
            const combinedStream = new MediaStream([...canvasStream.getTracks(), ...audioStream.getTracks()]);
            
            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'OsuIraqToday_Replay.webm';
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(url);
                recordedChunks = [];
            };

            mediaRecorder.start();
            isRecording = true;
            exportBtn.innerText = "⏹ STOP RECORDING";
            exportBtn.style.color = "white";
            exportBtn.style.background = "var(--iraq-red)";
            
            audioElement.currentTime = 0;
            document.getElementById('outro-screen').classList.remove('active');
            document.getElementById('stats-screen').classList.remove('active');
            startIntroSequence();
        });
    </script>
</body>
</html>
